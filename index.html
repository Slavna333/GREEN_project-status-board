import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZx_SFvKalRi8T2hhpCFqflZQRp4v9hGc",
  authDomain: "green-project-status-board.firebaseapp.com",
  databaseURL: "https://green-project-status-board-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "green-project-status-board",
  storageBucket: "green-project-status-board.firebasestorage.app",
  messagingSenderId: "111733022000",
  appId: "1:111733022000:web:8a3580d5474a7eecb83cf5"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const dbRef      = ref(db, "psb/projects");
const summaryRef = ref(db, "psb/summary");

const B = {
  green:"#34B78F", green15:"#e5f6f2", green25:"#cdeee6",
  gray:"#5B6770",  gray15:"#eceef0",  gray25:"#d6d9db",  gray50:"#adb3b7",
  white:"#ffffff", text:"#2c2c2c",    textLight:"#5B6770", border:"#d6d9db", bg:"#f5f6f7",
};
const RAG = {
  green:  {bg:"#e8f8f3", text:"#1a6b50", dot:B.green,   label:"On track"},
  yellow: {bg:"#fef9e7", text:"#7a6020", dot:"#c8a030", label:"At risk"},
  red:    {bg:"#fdf0ef", text:"#8b2a1f", dot:"#d9534f", label:"Issues"},
};

let projects = [];
let summary  = {planRub:"", fyStart:"", fyEnd:"", rates:{}};
let saving   = false;

const fmt  = n => (n==null||n==="") ? "" : Number(n).toLocaleString("en-US");
const fmtM = n => (n==null||isNaN(n)) ? "—" : (n/1000000).toFixed(2);
const num  = v => parseFloat(v)||0;
const esc  = s => (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;");
const uid  = ()  => Date.now()+"_"+Math.random().toString(36).slice(2);

function daysSince(d) { if(!d) return null; return Math.floor((Date.now()-new Date(d).getTime())/86400000); }
function emptyBilling() { return {invoiceReady:false,invoiceSent:false,sentDate:"",clientFeedback:false,paid:false,paidDate:"",paidRate:""}; }
function emptyDel(name="") { return {id:uid(),name,done:false,amount:"",billing:emptyBilling()}; }
function emptyProject() { return {id:uid(),name:"",client:"",rag:"green",contractValue:"",currency:"USD",paymentDays:"",yearPlanRub:"",deliverables:[]}; }
function getProject(id) { return projects.find(p=>p.id===id); }

function saveToFirebase() {
  if(saving) return; saving=true;
  set(dbRef,projects).then(()=>{saving=false;}).catch(()=>{saving=false;});
}
function saveSummary() { set(summaryRef,summary).catch(()=>{}); }
function updateProject(id,fn) { const p=getProject(id); fn(p); saveToFirebase(); renderAll(); }

// ── Fiscal year helpers ───────────────────────────────────────────────────────
function inFY(dateStr) {
  if(!dateStr||!summary.fyStart||!summary.fyEnd) return false;
  const d=new Date(dateStr), s=new Date(summary.fyStart), e=new Date(summary.fyEnd);
  e.setHours(23,59,59);
  return d>=s && d<=e;
}

// ── Finance calculations ──────────────────────────────────────────────────────
function getRate(p) { return p.currency==="RUB"?1:num(summary.rates[p.currency]); }

function calcFin(p) {
  const cv=num(p.contractValue);
  const paid=p.deliverables.filter(d=>d.billing?.paid).reduce((s,d)=>s+num(d.amount),0);
  const ar=p.deliverables.filter(d=>d.billing?.invoiceSent&&!d.billing?.paid).reduce((s,d)=>s+num(d.amount),0);
  const remaining=Math.max(0,cv-paid);
  const paidPct=cv?Math.min(100,Math.round(paid/cv*100)):0;
  const arPctC=cv?Math.min(100-paidPct,Math.round(ar/cv*100)):0;
  const arPctR=remaining>0?Math.round(ar/remaining*100):0;
  return {cv,paid,ar,remaining,paidPct,arPctC,arPctR};
}

function calcFinRub(p) {
  const currentRate=getRate(p);
  // total collected (all time) — uses locked rate per payment
  const collectedTotal=p.deliverables.filter(d=>d.billing?.paid).reduce((s,d)=>{
    const r=num(d.billing.paidRate)||currentRate;
    return s+num(d.amount)*r;
  },0);
  // YTD collected — only payments within fiscal year, uses locked rate
  const collectedYTD=p.deliverables.filter(d=>d.billing?.paid&&inFY(d.billing.paidDate)).reduce((s,d)=>{
    const r=num(d.billing.paidRate)||currentRate;
    return s+num(d.amount)*r;
  },0);
  const arRub=p.deliverables.filter(d=>d.billing?.invoiceSent&&!d.billing?.paid).reduce((s,d)=>s+num(d.amount)*currentRate,0);
  const {remaining}=calcFin(p);
  const remainRub=remaining*currentRate;
  const hasRate=p.currency==="RUB"||currentRate>0;
  // warning: paid but no paidDate
  const missingDate=p.deliverables.filter(d=>d.billing?.paid&&!d.billing?.paidDate).length;
  return {collectedTotal,collectedYTD,arRub,remainRub,hasRate,missingDate};
}

// ── Summary render ────────────────────────────────────────────────────────────
function renderSummary() {
  const usedCurrencies=[...new Set(["USD",...projects.map(p=>p.currency).filter(Boolean)])].filter(c=>c!=="RUB");

  const settingsHTML=`
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:${B.gray15};border-radius:4px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:11px;color:${B.textLight};font-weight:700;text-transform:uppercase;letter-spacing:.06em">Fiscal year:</span>
        <input type="date" value="${summary.fyStart||""}" style="font-size:12px;width:130px" onchange="window.setFY('start',this.value)">
        <span style="font-size:11px;color:${B.textLight}">—</span>
        <input type="date" value="${summary.fyEnd||""}" style="font-size:12px;width:130px" onchange="window.setFY('end',this.value)">
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;color:${B.textLight};font-weight:700;text-transform:uppercase;letter-spacing:.06em">Rates to RUB:</span>
        ${usedCurrencies.map(c=>`<div style="display:flex;align-items:center;gap:5px">
          <span style="font-size:12px;color:${B.text};font-weight:700">${c}:</span>
          <input type="number" placeholder="0" value="${summary.rates[c]||""}" style="width:72px;font-size:12px" onchange="window.setRate('${c}',this.value)">
        </div>`).join("")}
      </div>
    </div>`;

  // per-project rows
  let deptYTD=0, deptYearPlan=0, deptAR=0, deptRemain=0, allOk=true;

  const rows=projects.map(p=>{
    const r=RAG[p.rag];
    const {collectedYTD,arRub,remainRub,hasRate,missingDate}=calcFinRub(p);
    const yearPlan=num(p.yearPlanRub)*1000000;
    const towardYearPlan=yearPlan>0?Math.max(0,yearPlan-collectedYTD-arRub):remainRub;
    const ytdPct=yearPlan>0&&hasRate?Math.min(999,Math.round(collectedYTD/yearPlan*100)):null;
    const pctColor=ytdPct===null?"":ytdPct>=100?"#1a6b50":ytdPct>=70?"#1a6b50":ytdPct>=40?"#7a6020":"#8b2a1f";
    const warn=missingDate>0?`<span title="${missingDate} paid deliverable(s) missing payment date — not counted in YTD" style="color:#8b2a1f;font-size:11px;margin-left:4px">⚠</span>`:"";

    if(!hasRate) allOk=false;
    if(hasRate) { deptYTD+=collectedYTD; deptAR+=arRub; deptRemain+=remainRub; }
    deptYearPlan+=yearPlan;

    return `<tr style="border-bottom:1px solid ${B.border}">
      <td style="padding:8px 12px;font-size:12px;font-weight:600;color:${B.text}">${p.name||"—"}${warn}</td>
      <td style="padding:8px 12px;text-align:center">
        <span style="background:${r.bg};color:${r.text};font-size:10px;font-weight:700;padding:2px 10px;border-radius:2px;text-transform:uppercase;letter-spacing:.04em">${r.label}</span>
      </td>
      <td style="padding:8px 12px;font-size:12px;text-align:right;color:${B.textLight}">
        ${yearPlan>0?`<b style="color:${B.text}">${fmtM(yearPlan)}</b> M`:
        `<span style="font-size:10px;color:${B.gray50}">—</span>`}
      </td>
      <td style="padding:8px 12px;font-size:12px;color:#1a6b50;font-weight:600;text-align:right">
        ${hasRate?`${fmtM(collectedYTD)} M`:"—"}
      </td>
      <td style="padding:8px 12px;text-align:right">
        ${ytdPct!==null?`<span style="font-size:13px;font-weight:700;color:${pctColor}">${ytdPct}%</span>`:
        yearPlan>0&&!hasRate?`<span style="font-size:10px;color:${B.gray50}">no rate</span>`:`<span style="font-size:10px;color:${B.gray50}">—</span>`}
      </td>
      <td style="padding:8px 12px;font-size:12px;color:#7a6020;font-weight:500;text-align:right">${hasRate?`${fmtM(arRub)} M`:"—"}</td>
      <td style="padding:8px 12px;font-size:12px;color:${B.textLight};text-align:right">${hasRate?`${fmtM(towardYearPlan)} M`:"—"}</td>
    </tr>`;
  }).join("");

  // totals
  const planRub=num(summary.planRub)*1000000;
  const deptPct=deptYearPlan>0?Math.min(999,Math.round(deptYTD/deptYearPlan*100)):null;
  const planPct=planRub>0?Math.min(999,Math.round(deptYTD/planRub*100)):null;
  const deptPctColor=deptPct===null?"":deptPct>=100?"#1a6b50":deptPct>=70?"#1a6b50":deptPct>=40?"#7a6020":"#8b2a1f";
  const planPctColor=planPct===null?"":planPct>=100?"#1a6b50":planPct>=70?"#1a6b50":planPct>=40?"#7a6020":"#8b2a1f";

  // progress bar
  const barBase=Math.max(planRub,deptYearPlan,deptYTD+deptAR+deptRemain,1);
  const barYTD=Math.min(100,Math.round(deptYTD/barBase*100));
  const barAR=Math.min(100-barYTD,Math.round(deptAR/barBase*100));
  const barPlanMark=planRub>0?Math.min(100,Math.round(planRub/barBase*100)):null;
  const barYearMark=deptYearPlan>0?Math.min(100,Math.round(deptYearPlan/barBase*100)):null;

  // доnut + progress bar vs dept plan
  const towardPlan = planRub > 0 ? Math.max(0, planRub - deptYTD - deptAR) : 0;
  const donutViz = planRub>0&&allOk ? (()=>{
    const base = planRub;
    const ytdA = Math.min(deptYTD/base, 1);
    const arA  = Math.min(deptAR/base,  1-ytdA);
    const remA = Math.min(towardPlan/base, 1-ytdA-arA);
    const r=52, cx=60, cy=60;
    function slice(start, end, color) {
      if(end-start < 0.001) return "";
      const a1=start*2*Math.PI-Math.PI/2, a2=end*2*Math.PI-Math.PI/2;
      const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
      const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const large=end-start>0.5?1:0;
      return `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${color}"/>`;
    }
    const bg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${B.border}"/>`;
    const s1=slice(0, ytdA, B.green);
    const s2=slice(ytdA, ytdA+arA, "#c8a030");
    const s3=slice(ytdA+arA, ytdA+arA+remA, B.gray25);
    const inner=`<circle cx="${cx}" cy="${cy}" r="34" fill="${B.white}"/>`;
    const pct=Math.round(deptYTD/base*100);
    const pctColor=pct>=70?"#1a6b50":pct>=40?"#7a6020":"#8b2a1f";
    const label=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="15" font-weight="700" font-family="Arial" fill="${pctColor}">${pct}%</text><text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="8" font-family="Arial" fill="${B.textLight}">of plan</text>`;
    return `<svg width="120" height="120" viewBox="0 0 120 120">${bg}${s1}${s2}${s3}${inner}${label}</svg>`;
  })() : "";

  const barYTD = planRub>0 ? Math.min(100, Math.round(deptYTD/planRub*100)) : 0;
  const barAR  = planRub>0 ? Math.min(100-barYTD, Math.round(deptAR/planRub*100)) : 0;
  const barRem = planRub>0 ? Math.min(100-barYTD-barAR, Math.round(towardPlan/planRub*100)) : 0;

  const progressBar = planRub>0&&allOk ? `
    <div style="margin-bottom:6px">
      <div style="height:10px;background:${B.border};border-radius:2px;overflow:hidden;display:flex">
        <div style="width:${barYTD}%;background:${B.green};transition:width .3s"></div>
        <div style="width:${barAR}%;background:#c8a030;transition:width .3s"></div>
        <div style="width:${barRem}%;background:${B.gray25};transition:width .3s"></div>
      </div>
    </div>` : "";

  const donutLegend = planRub>0&&allOk ? `
    <div style="display:flex;flex-direction:column;gap:6px;justify-content:center">
      <div style="font-size:11px;color:#1a6b50;display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:${B.green};border-radius:2px;display:inline-block;flex-shrink:0"></span><b>${fmtM(deptYTD)} M</b> collected</div>
      ${deptAR>0?`<div style="font-size:11px;color:#7a6020;display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:#c8a030;border-radius:2px;display:inline-block;flex-shrink:0"></span><b>${fmtM(deptAR)} M</b> AR</div>`:""}
      <div style="font-size:11px;color:${B.textLight};display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:${B.gray25};border-radius:2px;display:inline-block;flex-shrink:0"></span><b>${fmtM(towardPlan)} M</b> to plan</div>
      <div style="font-size:10px;color:${B.textLight};margin-top:2px;padding-top:6px;border-top:1px solid ${B.border}">Dept plan: <b style="color:${B.text}">${fmtM(planRub)} M</b></div>
    </div>` : "";

  const vizRow = planRub>0&&allOk ? `
    <tr style="background:${B.white}">
      <td colspan="7" style="padding:10px 16px 16px">
        ${progressBar}
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:8px">
          ${donutViz}
          ${donutLegend}
        </div>
      </td>
    </tr>` : "";

  const totalRow=`
    <tr style="background:${B.green15};border-top:2px solid ${B.green}">
      <td colspan="2" style="padding:8px 12px;font-size:11px;color:${B.green};font-weight:700;letter-spacing:.06em;text-transform:uppercase">Department total</td>
      <td style="padding:8px 12px;font-size:12px;text-align:right">
        ${deptYearPlan>0?`<b style="color:${B.text}">${fmtM(deptYearPlan)}</b> M`:"—"}
        ${planRub>0?`<div style="font-size:10px;color:${B.textLight}">dept plan: ${fmtM(planRub)} M</div>`:""}
      </td>
      <td style="padding:8px 12px;font-size:13px;color:#1a6b50;font-weight:700;text-align:right">${allOk?`${fmtM(deptYTD)} M`:"—"}</td>
      <td style="padding:8px 12px;text-align:right">
        ${planPct!==null?`<span style="font-size:16px;font-weight:700;color:${planPctColor}">${planPct}%</span><span style="font-size:10px;color:${B.textLight};display:block">of dept plan</span>`:""}
      </td>
      <td style="padding:8px 12px;font-size:13px;color:#7a6020;font-weight:700;text-align:right">${allOk?`${fmtM(deptAR)} M`:"—"}</td>
      <td style="padding:8px 12px;font-size:13px;color:${B.textLight};font-weight:700;text-align:right">${allOk?`${fmtM(deptRemain)} M`:"—"}</td>
    </tr>
    ${vizRow}`;

  document.getElementById("summaryBlock").innerHTML=`
    <div style="background:${B.white};border:1px solid ${B.border};border-radius:4px;margin-bottom:24px;overflow:hidden">
      <div style="background:${B.gray};padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span style="font-size:12px;font-weight:700;color:${B.white};letter-spacing:.08em;text-transform:uppercase">Revenue Summary · M RUB</span>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;color:rgba(255,255,255,0.7)">Dept plan (M RUB):</span>
            <input type="number" placeholder="0.00" value="${summary.planRub||""}" style="width:80px;font-size:12px;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:${B.white}" onchange="window.setPlan(this.value)">
          </div>
          <div style="display:flex;gap:6px">
            <button onclick="window.exportSummaryPDF()" style="font-size:11px;font-weight:700;color:${B.green};background:rgba(255,255,255,0.1);border:1px solid ${B.green};border-radius:2px;padding:4px 10px;cursor:pointer;font-family:Arial,sans-serif">PDF</button>
            <button onclick="window.exportSummaryPPTX()" style="font-size:11px;font-weight:700;color:${B.white};background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.4);border-radius:2px;padding:4px 10px;cursor:pointer;font-family:Arial,sans-serif">PPTX</button>
          </div>
        </div>
      </div>
      <div style="padding:14px 16px">
        ${settingsHTML}
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:2px solid ${B.green}">
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:left;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Project</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:center;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Status</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.text};text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Year plan</th>
            <th style="padding:8px 12px;font-size:10px;color:#1a6b50;text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Collected YTD</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.text};text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">% of plan</th>
            <th style="padding:8px 12px;font-size:10px;color:#7a6020;text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">AR</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Outstanding</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot>${totalRow}</tfoot>
        </table>
        ${!allOk?`<div style="font-size:10px;color:${B.gray50};margin-top:6px">* Some projects missing exchange rate</div>`:""}
        ${!summary.fyStart?`<div style="font-size:10px;color:#7a6020;margin-top:4px">⚠ Set fiscal year dates above to enable YTD calculation</div>`:""}
      </div>
    </div>`;
}

// ── Finance block per card ────────────────────────────────────────────────────
function financeHTML(p) {
  const {cv,paid,ar,remaining,paidPct,arPctC,arPctR}=calcFin(p);
  if(!cv) return "";
  const {collectedTotal,missingDate}=calcFinRub(p);
  const allocated=p.deliverables.reduce((s,d)=>s+num(d.amount),0);
  const diff=cv-allocated;
  const allocColor=Math.abs(diff)<0.01?"#1a6b50":diff<0?"#8b2a1f":"#7a6020";
  const allocNote=Math.abs(diff)<0.01?"Match":diff>0?`${p.currency} ${fmt(diff)} unallocated`:`${p.currency} ${fmt(Math.abs(diff))} over`;
  const missingWarn=missingDate>0?`<div style="font-size:10px;color:#8b2a1f;margin-top:4px">⚠ ${missingDate} paid deliverable(s) missing payment date — not counted in YTD</div>`:"";
  return `<div style="margin-bottom:14px;padding:12px 14px;background:${B.gray15};border-left:3px solid ${B.green};border-radius:2px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:10px;color:${B.textLight};font-weight:700;letter-spacing:.08em;text-transform:uppercase">Contract finances</span>
      <span style="font-size:12px;font-weight:700;color:${B.text}">${p.currency} ${fmt(cv)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:4px 8px;background:${B.white};border-radius:2px;border:1px solid ${B.border}">
      <span style="font-size:11px;color:${B.textLight}">Allocated:</span>
      <span style="font-size:11px;font-weight:600;color:${allocColor}">${p.currency} ${fmt(allocated)} — ${allocNote}</span>
    </div>
    <div style="height:8px;background:${B.border};border-radius:1px;overflow:hidden;display:flex;margin-bottom:8px">
      <div style="width:${paidPct}%;background:${B.green};transition:width .3s"></div>
      <div style="width:${arPctC}%;background:#c8a030;transition:width .3s"></div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:${B.text}">
      <span><b>${paidPct}%</b> paid — ${p.currency} ${fmt(paid)}</span>
      ${ar>0?`<span>AR: ${p.currency} ${fmt(ar)}</span>`:""}
      <span style="color:${B.textLight}">Outstanding: ${p.currency} ${fmt(remaining)}</span>
    </div>
    ${missingWarn}
  </div>`;
}

// ── Billing ───────────────────────────────────────────────────────────────────
function billingIcon(d) {
  if(!d.done) return "";
  if(d.billing.paid) return "💰";
  if(d.billing.invoiceSent) return "📤";
  if(d.billing.invoiceReady) return "📋";
  return "";
}

function billingPanelHTML(d,pid) {
  const b=d.billing||emptyBilling();
  const cur=(getProject(pid)||{}).currency||"USD";
  const currentRate=cur!=="RUB"?(summary.rates[cur]||""):"";
  const sentDays=daysSince(b.sentDate);
  const paidDays=(b.sentDate&&b.paidDate)?Math.floor((new Date(b.paidDate)-new Date(b.sentDate))/86400000):null;
  const terms=num((getProject(pid)||{}).paymentDays)||30;
  const warn=Math.round(terms*0.7);
  const unpaidChip=(!b.paid&&b.invoiceSent&&b.sentDate&&sentDays!==null)?
    (()=>{
      const s=sentDays>terms?"background:#fdf0ef;color:#8b2a1f":sentDays>warn?"background:#fef9e7;color:#7a6020":"background:#e8f8f3;color:#1a6b50";
      const h=sentDays>terms?"Overdue — consider penalties":sentDays>warn?"Consider sending a reminder":"Within payment window";
      return `<span style="font-size:11px;font-weight:600;border-radius:2px;padding:2px 8px;${s}">${sentDays}d</span>
              <div style="font-size:11px;font-style:italic;margin-top:2px;color:${sentDays>terms?"#8b2a1f":sentDays>warn?"#7a6020":B.textLight}">${h}</div>`;
    })():"";
  const paidChip=(b.paid&&paidDays!==null)?`<span style="font-size:11px;font-weight:600;border-radius:2px;padding:2px 8px;background:#e8f8f3;color:#1a6b50">Paid in ${paidDays}d</span>`:(b.paid?`<span style="font-size:11px;font-weight:600;border-radius:2px;padding:2px 8px;background:#e8f8f3;color:#1a6b50">Paid</span>`:"")
  const missingDateWarn=b.paid&&!b.paidDate?`<span style="font-size:11px;color:#8b2a1f;font-weight:600">⚠ Enter payment date for YTD tracking</span>`:"";
  const inFYbadge=b.paid&&b.paidDate?(inFY(b.paidDate)?`<span style="font-size:10px;background:${B.green15};color:#1a6b50;border-radius:2px;padding:1px 6px">In FY</span>`:`<span style="font-size:10px;background:${B.gray15};color:${B.textLight};border-radius:2px;padding:1px 6px">Out of FY</span>`):"";

  return `<div class="billing-panel${d._open?" open":""}" id="bp_${d.id}">
    <div style="margin-top:8px;padding:10px 12px;background:${B.gray15};border:1px solid ${B.border};border-radius:2px">
      <div style="font-size:10px;color:${B.textLight};text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:8px">Billing</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:${B.text}">
        <span style="white-space:nowrap">Amount (${cur})</span>
        <input type="number" style="width:120px" value="${d.amount||""}" placeholder="0" onchange="window.setDelAmount('${pid}','${d.id}',this.value)">
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:${B.text}">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.invoiceReady?"checked":""} onchange="window.setBilling('${pid}','${d.id}','invoiceReady',this.checked)"> Invoice prepared</label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:${B.text};flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.invoiceSent?"checked":""} onchange="window.setBilling('${pid}','${d.id}','invoiceSent',this.checked)"> Invoice sent</label>
        ${b.invoiceSent?`<input type="text" value="${b.sentDate||""}" placeholder="2026-04-18" style="width:90px;font-size:11px" onchange="window.setBilling('${pid}','${d.id}','sentDate',this.value)">`:""} ${unpaidChip}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:${B.text}">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.clientFeedback?"checked":""} onchange="window.setBilling('${pid}','${d.id}','clientFeedback',this.checked)"> Client acknowledged</label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:${B.text};flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.paid?"checked":""} onchange="window.setBilling('${pid}','${d.id}','paid',this.checked)">
          <span style="font-weight:${b.paid?700:400};color:${b.paid?B.green:B.text}">Payment received</span>
        </label>
        ${b.paid?`<input type="text" value="${b.paidDate||""}" placeholder="2026-04-18" style="width:90px;font-size:11px" onchange="window.setBilling('${pid}','${d.id}','paidDate',this.value)">`:""} 
        ${b.paid&&cur!=="RUB"?`<span style="font-size:11px;color:${B.textLight};white-space:nowrap">Rate:</span><input type="number" value="${b.paidRate||currentRate}" placeholder="${currentRate||"rate"}" style="width:70px;font-size:11px" onchange="window.setBilling('${pid}','${d.id}','paidRate',this.value)">`:""}

// ── Deliverable ───────────────────────────────────────────────────────────────

// ── Actions ───────────────────────────────────────────────────────────────────
window.setField      = (pid,f,v)=>updateProject(pid,p=>p[f]=v);
window.cycleRag      = pid=>{const o=["green","yellow","red"];updateProject(pid,p=>p.rag=o[(o.indexOf(p.rag)+1)%3]);};
window.addProject    = ()=>{projects.push(emptyProject());saveToFirebase();renderAll();};
window.removeProject = pid=>{if(!confirm("Delete this project? This cannot be undone."))return;projects=projects.filter(p=>p.id!==pid);saveToFirebase();renderAll();};
window.addDel        = pid=>updateProject(pid,p=>p.deliverables.push(emptyDel()));
window.removeDel     = (pid,did)=>{if(!confirm("Delete this deliverable?"))return;updateProject(pid,p=>p.deliverables=p.deliverables.filter(d=>d.id!==did));};
window.toggleDone    = (pid,did,val)=>updateProject(pid,p=>{const d=p.deliverables.find(d=>d.id===did);d.done=val;if(val)d._open=true;});
window.toggleBilling = (pid,did)=>{const p=getProject(pid);const d=p.deliverables.find(d=>d.id===did);if(!d.done)return;d._open=!d._open;saveToFirebase();renderAll();};
window.setBilling    = (pid,did,f,v)=>updateProject(pid,p=>{p.deliverables.find(d=>d.id===did).billing[f]=v;});
window.setDelAmount  = (pid,did,v)=>updateProject(pid,p=>{p.deliverables.find(d=>d.id===did).amount=v;});
window.setDelName    = (pid,did,v)=>updateProject(pid,p=>{p.deliverables.find(d=>d.id===did).name=v;});
window.setDelStatus  = (pid,did,v)=>updateProject(pid,p=>{p.deliverables.find(d=>d.id===did).status=v;});
window.setPlan       = v=>{summary.planRub=v;saveSummary();renderSummary();};
window.setRate       = (cur,v)=>{summary.rates[cur]=v;saveSummary();renderSummary();};
window.setFY         = (part,v)=>{summary[part==="start"?"fyStart":"fyEnd"]=v;saveSummary();renderSummary();};

// ── Upload ────────────────────────────────────────────────────────────────────
window.handleUpload=async(pid,input)=>{
  const file=input.files[0];if(!file)return;
  const errEl=document.getElementById("uerr_"+pid);
  const key=document.getElementById("apiKey").value.trim()||localStorage.getItem("green_api_key")||"";
  if(!key){errEl.textContent="No API key.";return;}
  localStorage.setItem("green_api_key",key);errEl.textContent="Parsing…";
  try{
    let messages;
    if(file.name.endsWith(".pdf")){const buf=await file.arrayBuffer();let s="";new Uint8Array(buf).forEach(b=>s+=String.fromCharCode(b));
      messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:btoa(s)}},{type:"text",text:'List all deliverables. Return ONLY a JSON array of strings.'}]}];
    }else{const text=await file.text();messages=[{role:"user",content:`List all deliverables. Return ONLY a JSON array of strings.\n\n${text.slice(0,4000)}`}];}
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages})});
    const data=await res.json();
    if(data.error){errEl.textContent="API error: "+data.error.message;return;}
    const raw=data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    updateProject(pid,p=>JSON.parse(raw).forEach(name=>p.deliverables.push(emptyDel(name))));
    errEl.textContent="";
  }catch(e){errEl.textContent="Error: "+e.message;}
  input.value="";
};

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${p.name}</title>

    <div style="background:${r.bg};color:${r.text};font-size:11px;font-weight:700;padding:5px 14px;border-radius:2px;text-transform:uppercase">${r.label}</div>

onValue(dbRef,snapshot=>{
  const data=snapshot.val();let loaded=[];
  if(Array.isArray(data))loaded=data;
  else if(data&&typeof data==="object")loaded=Object.values(data);
  projects=loaded.map(p=>({...p,deliverables:Array.isArray(p.deliverables)?p.deliverables.map(d=>({...d,billing:d.billing||emptyBilling()})):[]}));
  if(projects.length===0)projects=[emptyProject()];
  renderAll();
});
onValue(summaryRef,snapshot=>{
  const data=snapshot.val();
  if(data)summary={planRub:data.planRub||"",fyStart:data.fyStart||"",fyEnd:data.fyEnd||"",rates:data.rates||{}};
  renderSummary();
});
