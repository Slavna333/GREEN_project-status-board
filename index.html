// ── Brand colors ──────────────────────────────────────────────────────────────
const B = {
  green:     "#34B78F",
  green85:   "#4ec49d",

  green25:   "#cdeee6",

  yellow: { bg:"#fef9e7", text:"#7a6020", dot:"#c8a030", label:"At risk"  },

};

let projects = [];
let summary = { planRub: "", rates: {} };
let saving = false;

function fmt(n) { return (n==null||n==="") ? "" : Number(n).toLocaleString("en-US"); }
function fmtM(n) { return (n==null||isNaN(n)) ? "—" : (n/1000000).toFixed(2); }
function num(v) { return parseFloat(v)||0; }
function daysSince(d) { if(!d) return null; return Math.floor((Date.now()-new Date(d).getTime())/86400000); }
function uid() { return Date.now()+"_"+Math.random().toString(36).slice(2); }
function emptyBilling() { return {invoiceReady:false,invoiceSent:false,sentDate:"",clientFeedback:false,paid:false,paidDate:"",paidRate:""}; }
function emptyDel(name="") { return {id:uid(),name,done:false,amount:"",billing:emptyBilling()}; }
function emptyProject() { return {id:uid(),name:"",client:"",rag:"green",contractValue:"",currency:"USD",paymentDays:"",deliverables:[]}; }
function esc(s) { return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function getProject(id) { return projects.find(p=>p.id===id); }

function saveToFirebase() {
  if(saving) return; saving=true;
  set(dbRef,projects).then(()=>{saving=false;}).catch(()=>{saving=false;});
}
function saveSummary() { set(summaryRef,summary).catch(()=>{}); }
function updateProject(id,fn) { const p=getProject(id); fn(p); saveToFirebase(); renderAll(); }

// ── Finances ──────────────────────────────────────────────────────────────────
function getRate(p) { return p.currency==="RUB"?1:num(summary.rates[p.currency]); }

function calcFin(p) {
  const cv=num(p.contractValue);
  const paid=p.deliverables.filter(d=>d.billing?.paid).reduce((s,d)=>s+num(d.amount),0);
  const ar=p.deliverables.filter(d=>d.billing?.invoiceSent&&!d.billing?.paid).reduce((s,d)=>s+num(d.amount),0);
  const remaining=Math.max(0,cv-paid);
  const paidPct=cv?Math.min(100,Math.round(paid/cv*100)):0;
  const arPctC=cv?Math.min(100-paidPct,Math.round(ar/cv*100)):0;
  const arPctR=remaining>0?Math.round(ar/remaining*100):0;
  return {cv,paid,ar,remaining,paidPct,arPctC,arPctR};
}

// RUB conversion: paid uses locked rate, AR/outstanding use current rate
function calcFinRub(p) {
  const currentRate=getRate(p);
  const paidRub=p.deliverables.filter(d=>d.billing?.paid).reduce((s,d)=>{
    const lockedRate=num(d.billing.paidRate)||currentRate;
    return s+num(d.amount)*lockedRate;
  },0);
  const arRub=p.deliverables.filter(d=>d.billing?.invoiceSent&&!d.billing?.paid).reduce((s,d)=>s+num(d.amount)*currentRate,0);
  const {cv,remaining}=calcFin(p);
  const remainRub=remaining*currentRate;
  const cvRub=currentRate>0?(paidRub+arRub+remainRub):null;
  return {paidRub,arRub,remainRub,cvRub,hasRate:p.currency==="RUB"||currentRate>0};
}

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const usedCurrencies=[...new Set(["USD",...projects.map(p=>p.currency).filter(Boolean)])].filter(c=>c!=="RUB");
  const ratesHTML=usedCurrencies.length?`
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:${B.gray15};border-radius:4px">
      <span style="font-size:11px;color:${B.textLight};font-weight:700;letter-spacing:.06em;text-transform:uppercase">Exchange rates to RUB:</span>
      ${usedCurrencies.map(c=>`<div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:${B.text};font-weight:700">${c}:</span>
        <input type="number" placeholder="0" value="${summary.rates[c]||""}" style="width:72px;font-size:12px" onchange="window.setRate('${c}',this.value)">
      </div>`).join("")}
    </div>`:"";;

  const rows=projects.map(p=>{
    const r=RAG[p.rag];
    const {paidRub,arRub,remainRub,cvRub,hasRate}=calcFinRub(p);
    const {cv}=calcFin(p);
    return `<tr style="border-bottom:1px solid ${B.border}">
      <td style="padding:8px 12px;font-size:12px;font-weight:600;color:${B.text}">${p.name||"—"}</td>
      <td style="padding:8px 12px;text-align:center"><span style="background:${r.bg};color:${r.text};font-size:10px;font-weight:700;padding:2px 10px;border-radius:2px;letter-spacing:.04em;text-transform:uppercase">${r.label}</span></td>
      <td style="padding:8px 12px;font-size:11px;color:${B.textLight};text-align:right">${p.currency} ${fmt(cv)}</td>
      <td style="padding:8px 12px;font-size:12px;color:#1a6b50;font-weight:600;text-align:right">${hasRate?fmtM(paidRub):"—"}</td>
      <td style="padding:8px 12px;font-size:12px;color:#7a6020;font-weight:600;text-align:right">${hasRate?fmtM(arRub):"—"}</td>
      <td style="padding:8px 12px;font-size:12px;color:${B.text};text-align:right">${hasRate?fmtM(remainRub):"—"}</td>
      <td style="padding:8px 12px;font-size:12px;color:${B.text};font-weight:600;text-align:right">${cvRub!==null?fmtM(cvRub):`<span style="font-size:10px;color:${B.gray50}">no rate</span>`}</td>
    </tr>`;
  }).join("");

  let totalPaid=0,totalAr=0,totalRemain=0,totalCv=0,allConverted=true;
  projects.forEach(p=>{
    const {paidRub,arRub,remainRub,cvRub,hasRate}=calcFinRub(p);
    if(!hasRate){allConverted=false;return;}
    totalPaid+=paidRub; totalAr+=arRub; totalRemain+=remainRub; totalCv+=(cvRub||0);
  });

  const planRub=num(summary.planRub)*1000000;
  // Визуализация для department total
  const collectedPct = planRub>0&&allConverted ? Math.min(100,Math.round(totalPaid/planRub*100)) : (allConverted&&totalCv>0 ? Math.round(totalPaid/totalCv*100) : 0);
  const arPctViz     = planRub>0&&allConverted ? Math.min(100-collectedPct,Math.round(totalAr/planRub*100)) : (allConverted&&totalCv>0 ? Math.min(100-collectedPct,Math.round(totalAr/totalCv*100)) : 0);
  const base = planRub>0 ? planRub : totalCv;
  const vizHTML = allConverted&&base>0 ? `
    <tr style="background:${B.white}">
      <td colspan="7" style="padding:10px 12px 14px">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:${B.textLight};margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">
              <span>Collection progress${planRub>0?" vs plan":""}</span>
              <span>${collectedPct}%</span>
            </div>
            <div style="height:12px;background:${B.border};border-radius:2px;overflow:hidden;display:flex">
              <div style="width:${collectedPct}%;background:${B.green};transition:width .3s" title="Collected: ${fmtM(totalPaid)} M RUB"></div>
              <div style="width:${arPctViz}%;background:#c8a030;transition:width .3s" title="AR: ${fmtM(totalAr)} M RUB"></div>
            </div>
            <div style="display:flex;gap:14px;margin-top:6px;flex-wrap:wrap">
              <span style="font-size:10px;color:#1a6b50;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:${B.green};border-radius:1px;display:inline-block"></span>Collected ${fmtM(totalPaid)} M</span>
              ${totalAr>0?`<span style="font-size:10px;color:#7a6020;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:#c8a030;border-radius:1px;display:inline-block"></span>AR ${fmtM(totalAr)} M</span>`:""}
              <span style="font-size:10px;color:${B.textLight};display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:${B.border};border-radius:1px;display:inline-block"></span>Outstanding ${fmtM(totalRemain)} M</span>
              ${planRub>0?`<span style="font-size:10px;color:${B.textLight};display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:${B.gray25};border-radius:1px;display:inline-block"></span>Plan ${fmtM(planRub)} M</span>`:""}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <svg width="80" height="80" viewBox="0 0 80 80">
              ${(()=>{
                const r=34,cx=40,cy=40,total2=planRub>0?planRub:totalCv;
                const paidA=Math.min(collectedPct/100*2*Math.PI,2*Math.PI-0.01);
                const arA=Math.min((collectedPct+arPctViz)/100*2*Math.PI,2*Math.PI-0.01);
                const arc=(start,end,color)=>{
                  const x1=cx+r*Math.sin(start),y1=cy-r*Math.cos(start);
                  const x2=cx+r*Math.sin(end),y2=cy-r*Math.cos(end);
                  const large=end-start>Math.PI?1:0;
                  return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${color}"/>`;
                };
                const bg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${B.border}"/>`;
                const paid2=paidA>0?arc(0,paidA,B.green):"";
                const ar2=arA>paidA?arc(paidA,arA,"#c8a030"):"";
                const inner=`<circle cx="${cx}" cy="${cy}" r="22" fill="${B.white}"/>`;
                const label=`<text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="13" font-weight="700" font-family="Arial" fill="${B.text}">${collectedPct}%</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="8" font-family="Arial" fill="${B.textLight}">collected</text>`;
                return bg+paid2+ar2+inner+label;
              })()}
            </svg>
          </div>
        </div>
      </td>
    </tr>` : "";

  const totalRow=`<tr style="background:${B.green15};border-top:2px solid ${B.green}">
    <td colspan="3" style="padding:8px 12px;font-size:11px;color:${B.green};font-weight:700;letter-spacing:.06em;text-transform:uppercase">Department total</td>
    <td style="padding:8px 12px;font-size:13px;color:#1a6b50;font-weight:700;text-align:right">${allConverted?fmtM(totalPaid):"—"}</td>
    <td style="padding:8px 12px;font-size:13px;color:#7a6020;font-weight:700;text-align:right">${allConverted?fmtM(totalAr):"—"}</td>
    <td style="padding:8px 12px;font-size:13px;color:${B.text};font-weight:700;text-align:right">${allConverted?fmtM(totalRemain):"—"}</td>
    <td style="padding:8px 12px;font-size:13px;color:${B.text};font-weight:700;text-align:right">${allConverted?fmtM(totalCv):"—"}</td>
  </tr>
  ${planRub>0&&allConverted?`<tr style="background:${B.gray15}">
    <td colspan="3" style="padding:6px 12px;font-size:11px;color:${B.textLight}">Plan: <b style="color:${B.text}">${fmtM(planRub)} M RUB</b></td>
    <td colspan="4" style="padding:6px 12px;font-size:11px;color:${B.textLight};text-align:right">
      Collected <b style="color:#1a6b50">${Math.round(totalPaid/planRub*100)}%</b> of plan · Outstanding <b>${Math.round(totalRemain/planRub*100)}%</b> of plan
    </td>
  </tr>`:""}
  ${vizHTML}`;

  document.getElementById("summaryBlock").innerHTML=`
    <div style="background:${B.white};border:1px solid ${B.border};border-radius:4px;margin-bottom:24px;overflow:hidden">
      <div style="background:${B.gray};padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span style="font-size:12px;font-weight:700;color:${B.white};letter-spacing:.08em;text-transform:uppercase">Revenue Summary · M RUB</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:rgba(255,255,255,0.7)">Plan (M RUB):</span>
          <input type="number" placeholder="0.00" value="${summary.planRub||""}" style="width:80px;font-size:12px;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:${B.white}" onchange="window.setPlan(this.value)">
        </div>
      </div>
      <div style="padding:14px 16px">
        ${ratesHTML}
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:2px solid ${B.green}">
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:left;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Project</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:center;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Status</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Contract</th>
            <th style="padding:8px 12px;font-size:10px;color:#1a6b50;text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Collected</th>
            <th style="padding:8px 12px;font-size:10px;color:#7a6020;text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">AR</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.textLight};text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Outstanding</th>
            <th style="padding:8px 12px;font-size:10px;color:${B.text};text-align:right;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Total RUB</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot>${totalRow}</tfoot>
        </table>
        ${!allConverted?`<div style="font-size:10px;color:${B.gray50};margin-top:6px">* Some projects missing exchange rate — total may be incomplete</div>`:""}
      </div>
    </div>`;
}

// ── Finance block per card ────────────────────────────────────────────────────
function financeHTML(p) {
  const {cv,paid,ar,remaining,paidPct,arPctC,arPctR}=calcFin(p);
  if(!cv) return "";
  const allocated=p.deliverables.reduce((s,d)=>s+num(d.amount),0);
  const diff=cv-allocated;
  const allocColor=Math.abs(diff)<0.01?"#1a6b50":diff<0?"#8b2a1f":"#7a6020";
  const allocNote=Math.abs(diff)<0.01?"Deliverables match contract value":diff>0?`${p.currency} ${fmt(diff)} unallocated`:`${p.currency} ${fmt(Math.abs(diff))} over contract`;
  return `<div style="margin-bottom:14px;padding:12px 14px;background:${B.gray15};border-left:3px solid ${B.green};border-radius:2px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:10px;color:${B.textLight};font-weight:700;letter-spacing:.08em;text-transform:uppercase">Contract finances</span>
      <span style="font-size:12px;font-weight:700;color:${B.text}">${p.currency} ${fmt(cv)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:5px 8px;background:${B.white};border-radius:2px;border:1px solid ${B.border}">
      <span style="font-size:11px;color:${B.textLight}">Allocated:</span>
      <span style="font-size:11px;font-weight:600;color:${allocColor}">${p.currency} ${fmt(allocated)} — ${allocNote}</span>
    </div>
    <div style="height:8px;background:${B.border};border-radius:1px;overflow:hidden;display:flex;margin-bottom:8px">
      <div style="width:${paidPct}%;background:${B.green};transition:width .3s"></div>
      <div style="width:${arPctC}%;background:#c8a030;transition:width .3s"></div>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${B.text}"><span style="width:8px;height:8px;border-radius:1px;background:${B.green};display:inline-block"></span><b>${paidPct}%</b>&nbsp;paid — ${p.currency} ${fmt(paid)}</div>
      ${ar>0?`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${B.text}"><span style="width:8px;height:8px;border-radius:1px;background:#c8a030;display:inline-block"></span>AR: <b>${p.currency} ${fmt(ar)}</b> — ${arPctC}% of contract · ${arPctR}% of outstanding</div>`:""}
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${B.text}"><span style="width:8px;height:8px;border-radius:1px;background:${B.border};display:inline-block"></span>Outstanding: ${p.currency} ${fmt(remaining)}</div>
    </div>
  </div>`;
}

// ── Billing ───────────────────────────────────────────────────────────────────
function billingIcon(d) {
  if(!d.done) return "";
  if(d.billing.paid) return "💰";
  if(d.billing.invoiceSent) return "📤";
  if(d.billing.invoiceReady) return "📋";
  return "";
}

function billingPanelHTML(d,pid) {
  const b=d.billing||emptyBilling();
  const cur=(getProject(pid)||{}).currency||"USD";
  const sentDays=daysSince(b.sentDate);
  const paidDays=(b.sentDate&&b.paidDate)?Math.floor((new Date(b.paidDate)-new Date(b.sentDate))/86400000):null;
  const terms=num((getProject(pid)||{}).paymentDays)||30;
  const warn=Math.round(terms*0.7);
  const unpaidChip=(!b.paid&&b.invoiceSent&&b.sentDate&&sentDays!==null)?
    (()=>{
      const style=sentDays>terms?"background:#fdf0ef;color:#8b2a1f":sentDays>warn?"background:#fef9e7;color:#7a6020":"background:#e8f8f3;color:#1a6b50";
      const hint=sentDays>terms?"Overdue — consider penalties":sentDays>warn?"Consider sending a reminder":"Within payment window";
      return `<span style="font-size:11px;font-weight:600;border-radius:2px;padding:2px 8px;margin-left:4px;${style}">${sentDays}d</span>
              <div style="font-size:11px;margin-left:22px;font-style:italic;margin-top:2px;color:${sentDays>terms?"#8b2a1f":sentDays>warn?"#7a6020":B.textLight}">${hint}</div>`;
    })():"";
  const paidChip=(b.paid&&paidDays!==null)?`<span style="font-size:11px;font-weight:600;border-radius:2px;padding:2px 8px;background:#e8f8f3;color:#1a6b50">Paid in ${paidDays}d</span>`:"";
  const paidBadge=b.paid?`<span style="font-size:11px;background:${B.green};color:${B.white};border-radius:2px;padding:2px 10px;font-weight:600">Paid</span>`:"";
  return `<div class="billing-panel${d._open?" open":""}" id="bp_${d.id}">
    <div style="margin-top:8px;padding:10px 12px;background:${B.gray15};border:1px solid ${B.border};border-radius:2px">
      <div style="font-size:10px;color:${B.textLight};text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:8px">Billing</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:${B.text}">
        <span style="white-space:nowrap">Amount (${cur})</span>
        <input type="number" style="width:120px" value="${d.amount||""}" placeholder="0" onchange="window.setDelAmount('${pid}','${d.id}',this.value)">
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:${B.text}"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.invoiceReady?"checked":""} onchange="window.setBilling('${pid}','${d.id}','invoiceReady',this.checked)"> Invoice prepared</label></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:${B.text};flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.invoiceSent?"checked":""} onchange="window.setBilling('${pid}','${d.id}','invoiceSent',this.checked)"> Invoice sent</label>
        ${b.invoiceSent?`<input type="text" value="${b.sentDate||""}" placeholder="2026-04-18" style="width:90px;font-size:11px" onchange="window.setBilling('${pid}','${d.id}','sentDate',this.value)">`:""} ${unpaidChip}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:${B.text}"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${b.clientFeedback?"checked":""} onchange="window.setBilling('${pid}','${d.id}','clientFeedback',this.checked)"> Client acknowledged</label></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:${B.text};flex-wrap:wrap">

// ── Upload ────────────────────────────────────────────────────────────────────
window.handleUpload=async(pid,input)=>{
  const file=input.files[0];if(!file)return;
  const errEl=document.getElementById("uerr_"+pid);
  const key=document.getElementById("apiKey").value.trim()||localStorage.getItem("green_api_key")||"";
  if(!key){errEl.textContent="No API key entered above.";return;}
  localStorage.setItem("green_api_key",key);errEl.textContent="Parsing…";
  try{
    let messages;
    if(file.name.endsWith(".pdf")){const buf=await file.arrayBuffer();let s="";new Uint8Array(buf).forEach(b=>s+=String.fromCharCode(b));
      messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:btoa(s)}},{type:"text",text:'List all deliverables. Return ONLY a JSON array of strings.'}]}];
    }else{const text=await file.text();messages=[{role:"user",content:`List all deliverables. Return ONLY a JSON array of strings.\n\n${text.slice(0,4000)}`}];}
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages})});
    const data=await res.json();
    if(data.error){errEl.textContent="API error: "+data.error.message;return;}
    const raw=data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(raw);
    updateProject(pid,p=>parsed.forEach(name=>p.deliverables.push(emptyDel(name))));errEl.textContent="";
  }catch(e){errEl.textContent="Error: "+e.message;}
  input.value="";
};

    if(arPctC>0)slide.addShape(prs.ShapeType.rect,{x:0.55+9.1*paidPct/100,y:yOff+0.42,w:9.1*arPctC/100,h:0.16,fill:{color:"C8A030"}});
    const fl=[`${paidPct}% paid — ${p.currency} ${fmt(paid)}`,ar>0?`AR: ${p.currency} ${fmt(ar)}`:null,`Outstanding: ${p.currency} ${fmt(remaining)}`,`Allocated: ${p.currency} ${fmt(allocated)}`].filter(Boolean).join("   |   ");
    slide.addText(fl,{x:0.55,y:yOff+0.68,w:9.1,h:0.6,fontSize:9,color:"2C2C2C",wrap:true,fontFace:"Arial"});
    yOff+=1.75;
  }
  slide.addText("DELIVERABLES",{x:0.4,y:yOff,w:7,h:0.25,fontSize:8,bold:true,color:"5B6770",charSpacing:1,fontFace:"Arial"});
  slide.addText(`${done}/${total} completed`,{x:7.4,y:yOff,w:2.4,h:0.25,fontSize:9,color:"5B6770",align:"right",fontFace:"Arial"});
  yOff+=0.3;
  const tRows=[
    [{text:"Deliverable",options:{bold:true,color:"5B6770",fontFace:"Arial"}},{text:"Status",options:{bold:true,color:"5B6770",fontFace:"Arial"}},{text:"Amount",options:{bold:true,color:"5B6770",fontFace:"Arial"}},{text:"Billing",options:{bold:true,color:"5B6770",fontFace:"Arial"}}],
    ...p.deliverables.map(d=>{
      const b=d.billing||emptyBilling();const days=daysSince(b.sentDate);
      const bStatus=b.paid?`Paid ${b.paidDate||""}`:b.invoiceSent?`Sent ${b.sentDate||""} (${days}d)`:b.invoiceReady?"Invoice ready":d.done?"No invoice":"—";
      const bColor=b.paid?"1A6B50":b.invoiceSent?"7A6020":"5B6770";const st=d.status||"Not started";const stColor=st==="Done"?"1A6B50":st==="In progress"?"185FA5":"5B6770";
      return [{text:d.name||"—",options:{color:d.done?"5B6770":"2C2C2C",strike:d.done,fontFace:"Arial"}},{text:st,options:{color:stColor,fontFace:"Arial"}},{text:d.amount?`${p.currency} ${fmt(d.amount)}`:"—",options:{color:"5B6770",fontFace:"Arial"}},{text:bStatus,options:{color:bColor,fontFace:"Arial"}}];
    })
  ];
  if(tRows.length>1)slide.addTable(tRows,{x:0.4,y:yOff,w:9.4,colW:[3.8,1.6,1.8,2.2],fill:{color:"FFFFFF"},border:{color:"D6D9DB",pt:0.5},fontSize:10,color:"2C2C2C",fontFace:"Arial"});
  slide.addText("Billing: 📋 Invoice prepared  ·  📤 Invoice sent  ·  💰 Payment received",{x:0.4,y:6.6,w:9.4,h:0.25,fontSize:8,color:"5B6770",fontFace:"Arial"});
  slide.addText(`GREEN Engineering & Consulting · ${new Date().toLocaleDateString("en-GB")}`,{x:0.4,y:6.85,w:9.4,h:0.2,fontSize:8,color:"AABBBB",align:"right",fontFace:"Arial"});
  prs.writeFile({fileName:`${p.name||"project"}_status.pptx`});
};

// ── Firebase ──────────────────────────────────────────────────────────────────
onValue(dbRef,snapshot=>{
  const data=snapshot.val();let loaded=[];
  if(Array.isArray(data))loaded=data;
  else if(data&&typeof data==="object")loaded=Object.values(data);
  projects=loaded.map(p=>({...p,deliverables:Array.isArray(p.deliverables)?p.deliverables.map(d=>({...d,billing:d.billing||emptyBilling()})):[]}));
  if(projects.length===0)projects=[emptyProject()];
  renderAll();
});
onValue(summaryRef,snapshot=>{
  const data=snapshot.val();
  if(data)summary={planRub:data.planRub||"",rates:data.rates||{}};
  renderSummary();
});
</script>
