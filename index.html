<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Status Board — GREEN Engineering</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZx_SFvKalRi8T2hhpCFqflZQRp4v9hGc",
  authDomain: "green-project-status-board.firebaseapp.com",
  databaseURL: "https://green-project-status-board-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "green-project-status-board",
  storageBucket: "green-project-status-board.firebasestorage.app",
  messagingSenderId: "111733022000",
  appId: "1:111733022000:web:8a3580d5474a7eecb83cf5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, "psb/projects");

const RAG = {
  green:  { bg:"#e4f0e4", text:"#3a6b3a", dot:"#6aaa6a", label:"On track" },
  yellow: { bg:"#f5f0e4", text:"#7a6020", dot:"#c8a030", label:"At risk"  },
  red:    { bg:"#f5e8e8", text:"#7a3030", dot:"#c86060", label:"Issues"   }
};
const CURRENCIES = null;

let projects = [];
let saving = false;

function fmt(n) { return (n==null||n==="") ? "" : Number(n).toLocaleString("en-US"); }
function num(v) { return parseFloat(v)||0; }
function daysSince(d) { if(!d) return null; return Math.floor((Date.now()-new Date(d).getTime())/86400000); }
function uid() { return Date.now()+"_"+Math.random().toString(36).slice(2); }
function emptyBilling() { return {invoiceReady:false,invoiceSent:false,sentDate:"",clientFeedback:false,paid:false}; }
function emptyDel(name="") { return {id:uid(),name,done:false,amount:"",billing:emptyBilling()}; }
function emptyProject() { return {id:uid(),name:"",client:"",rag:"green",contractValue:"",currency:"USD",deliverables:[]}; }
function esc(s) { return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function getProject(id) { return projects.find(p=>p.id===id); }

function saveToFirebase() {
  if(saving) return;
  saving = true;
  set(dbRef, projects).then(()=>{ saving=false; }).catch(()=>{ saving=false; });
}

function updateProject(id, fn) {
  const p = getProject(id); fn(p);
  saveToFirebase(); renderAll();
}

// ── Finances ──────────────────────────────────────────────────────────────────
function calcFin(p) {
  const cv = num(p.contractValue);
  const paid = p.deliverables.filter(d=>d.billing?.paid).reduce((s,d)=>s+num(d.amount),0);
  const ar   = p.deliverables.filter(d=>d.billing?.invoiceSent&&!d.billing?.paid).reduce((s,d)=>s+num(d.amount),0);
  const remaining = Math.max(0,cv-paid);
  const paidPct = cv ? Math.min(100,Math.round(paid/cv*100)) : 0;
  const arPctC  = cv ? Math.min(100-paidPct,Math.round(ar/cv*100)) : 0;
  const arPctR  = remaining>0 ? Math.round(ar/remaining*100) : 0;
  return {cv,paid,ar,remaining,paidPct,arPctC,arPctR};
}

function financeHTML(p) {
  const {cv,paid,ar,remaining,paidPct,arPctC,arPctR} = calcFin(p);
  if(!cv) return "";
  return `<div class="finance-block">
    <div class="finance-header">
      <span class="section-label" style="margin:0">Contract finances</span>
      <span style="font-size:11px;font-weight:600;color:#2c3c2c">${p.currency} ${fmt(cv)}</span>
    </div>
    <div class="prog-bar">
      <div class="prog-paid" style="width:${paidPct}%"></div>
      <div class="prog-ar"   style="width:${arPctC}%"></div>
    </div>
    <div class="finance-legend">
      <div class="legend-item"><span class="legend-dot" style="background:#3a6b3a"></span><b>${paidPct}%</b>&nbsp;paid — ${p.currency} ${fmt(paid)}</div>
      ${ar>0?`<div class="legend-item"><span class="legend-dot" style="background:#c8a030"></span>AR: <b>${p.currency} ${fmt(ar)}</b> — ${arPctC}% of contract · ${arPctR}% of outstanding</div>`:""}
      <div class="legend-item"><span class="legend-dot" style="background:#dceadc;border:0.5px solid #d8e8d8"></span>Outstanding: ${p.currency} ${fmt(remaining)}</div>
    </div>
  </div>`;
}

// ── Deliverables ──────────────────────────────────────────────────────────────
function billingIcon(d) {
  if(!d.done) return "";
  if(d.billing.paid) return "💰";
  if(d.billing.invoiceSent) return "📤";
  if(d.billing.invoiceReady) return "📋";
  return "";
}

function billingPanelHTML(d, pid) {
  const b = d.billing; const days = daysSince(b.sentDate);
  const chipStyle = days===null ? "" : days>30 ? "background:#f5e8e8;color:#7a3030" : days>14 ? "background:#f5f0e4;color:#7a6020" : "background:#e4f0e4;color:#3a6b3a";
  const hint = days===null ? "" : days>30 ? "Overdue — consider penalties" : days>14 ? "Consider sending a reminder" : "Within payment window";
  const hintColor = days>30 ? "#7a3030" : days>14 ? "#7a6020" : "#7a8c7a";
  const cur = getProject(pid).currency;
  return `<div class="billing-panel${d._open?" open":""}" id="bp_${d.id}">
    <div class="billing-inner">
      <div style="font-size:10px;color:#7a8c7a;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px">Billing</div>
      <div class="billing-row" style="margin-bottom:8px">
        <span style="font-size:12px;color:#7a8c7a;white-space:nowrap">Amount (${cur})</span>
        <input type="number" style="width:120px" value="${d.amount||""}" placeholder="0"
          onchange="window.setDelAmount('${pid}','${d.id}',this.value)">
      </div>
      <div class="billing-row"><label><input type="checkbox" ${b.invoiceReady?"checked":""} onchange="window.setBilling('${pid}','${d.id}','invoiceReady',this.checked)"> Invoice prepared</label></div>
      <div class="billing-row">
        <label><input type="checkbox" ${b.invoiceSent?"checked":""} onchange="window.setBilling('${pid}','${d.id}','invoiceSent',this.checked)"> Invoice sent</label>
       ${b.invoiceSent?`<input type="text" value="${b.sentDate||""}" placeholder="2026-04-18" style="width:90px;font-size:11px" onchange="window.setBilling('${pid}','${d.id}','sentDate',this.value)">
          ${b.sentDate?`<span class="days-chip" style="${chipStyle}">${days}d</span>`:""}` : ""}
      </div>
      ${b.invoiceSent&&b.sentDate?`<div class="billing-hint" style="color:${hintColor}">${hint}</div>`:""}
      <div class="billing-row"><label><input type="checkbox" ${b.clientFeedback?"checked":""} onchange="window.setBilling('${pid}','${d.id}','clientFeedback',this.checked)"> Client acknowledged</label></div>
      <div class="billing-row">
        <label><input type="checkbox" ${b.paid?"checked":""} onchange="window.setBilling('${pid}','${d.id}','paid',this.checked)">
          <span style="font-weight:${b.paid?600:400};color:${b.paid?"#3a6b3a":"#2c3c2c"}">Payment received</span>
        </label>
        ${b.paid?`<span class="paid-badge">Paid</span>`:""}
      </div>
    </div>
  </div>`;
}

function deliverableHTML(d, pid) {
  const cur = getProject(pid).currency;
  return `<div class="dl-item" id="dli_${d.id}">
    <div class="dl-row ${d.done?"done":"pending"}">
      <input type="checkbox" ${d.done?"checked":""} onclick="window.toggleDone('${pid}','${d.id}',this.checked)">
      <input type="text" value="${esc(d.name)}" placeholder="Deliverable name"
        style="flex:1;font-size:12px;background:transparent;border:none;border-bottom:0.5px dashed #c0d4c0;border-radius:0;padding:2px 4px;color:${d.done?"#7a8c7a":"#2c3c2c"};text-decoration:${d.done?"line-through":"none"}"
        onchange="window.setDelName('${pid}','${d.id}',this.value)">
      <input type="number" value="${d.amount||""}" placeholder="Amount"
        style="width:90px;font-size:11px;text-align:right"
        onchange="window.setDelAmount('${pid}','${d.id}',this.value)">
      <span style="font-size:11px;color:#7a8c7a;white-space:nowrap">${cur}</span>
      ${d.done?`<span class="dl-icon" onclick="window.toggleBilling('${pid}','${d.id}')" style="cursor:pointer">${billingIcon(d)||"💳"}</span>
      <span class="dl-chevron" onclick="window.toggleBilling('${pid}','${d.id}')" style="cursor:pointer">${d._open?"▲":"▼"}</span>`:""}
      <button class="icon-btn" onclick="window.removeDel('${pid}','${d.id}')">×</button>
    </div>
    ${d.done?billingPanelHTML(d,pid):""}
  </div>`;
}

function deliverablesHTML(p) {
  const done = p.deliverables.filter(d=>d.done).length;
  const paid = p.deliverables.filter(d=>d.billing?.paid).length;
  const pct  = p.deliverables.length ? Math.round(done/p.deliverables.length*100) : 0;
  return `<div>
    <div class="dl-header">
      <span class="section-label" style="margin:0">Deliverables</span>
      ${p.deliverables.length?`<span style="font-size:11px;color:#7a8c7a">${done}/${p.deliverables.length} done · ${paid} paid</span>`:""}
    </div>
    ${p.deliverables.length?`<div class="dl-prog"><div class="dl-prog-fill" style="width:${pct}%"></div></div>`:""}
    <div>${p.deliverables.map(d=>deliverableHTML(d,p.id)).join("")||`<div class="empty-note">No deliverables yet</div>`}</div>
    <button class="add-btn" onclick="window.addDel('${p.id}')">+ Add deliverable</button>
  </div>`;
}

// ── Card ──────────────────────────────────────────────────────────────────────
function cardHTML(p) {
  const r = RAG[p.rag];
  return `<div class="card" id="card_${p.id}">
    <div class="card-header">
      <div class="card-header-top">
        <div style="flex:1;margin-right:10px">
          <input class="name-input" placeholder="Project name" value="${esc(p.name)}" onchange="window.setField('${p.id}','name',this.value)">
          <input class="client-input" placeholder="Client / funder" value="${esc(p.client)}" onchange="window.setField('${p.id}','client',this.value)">
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="rag-btn" style="background:${r.bg};color:${r.text}" onclick="window.cycleRag('${p.id}')">
            <span class="rag-dot" style="background:${r.dot}"></span>${r.label}
          </button>
          <button class="icon-btn" onclick="window.removeProject('${p.id}')">×</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:11px;color:#7a8c7a">Contract value:</span>
        <input type="text" value="${esc(p.currency)}" placeholder="USD" maxlength="5"
  style="width:60px;font-size:12px;text-align:center;text-transform:uppercase"
  onchange="window.setField('${p.id}','currency',this.value.toUpperCase())">
        <input type="number" placeholder="0" value="${p.contractValue||""}" style="width:140px"
          onchange="window.setField('${p.id}','contractValue',this.value)">
      </div>
    </div>
    <div class="card-body">
      ${financeHTML(p)}
      ${deliverablesHTML(p)}
      <div class="upload-area">
        <input type="file" accept=".txt,.pdf" id="fu_${p.id}" style="display:none" onchange="window.handleUpload('${p.id}',this)">
        <button class="upload-btn" onclick="document.getElementById('fu_${p.id}').click()">Upload deliverables (TXT or PDF) ↗</button>
        <div class="err" id="uerr_${p.id}"></div>
      </div>
      <div class="export-area">
        <span style="font-size:11px;color:#7a8c7a">Export:</span>
        <button class="export-btn btn-pdf" onclick="window.exportPDF('${p.id}')">PDF</button>
        <button class="export-btn btn-pptx" onclick="window.exportPPTX('${p.id}')">PPTX</button>
      </div>
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  document.getElementById("grid").innerHTML =
    projects.map(cardHTML).join("") +
    `<button class="add-card-btn" onclick="window.addProject()">+ Add project</button>`;
  const sum = {green:0,yellow:0,red:0};
  projects.forEach(p=>sum[p.rag]++);
  document.getElementById("ragSummary").innerHTML = ["green","yellow","red"].map(k=>{
    const r=RAG[k];
    return `<div class="rag-chip" style="background:${r.bg};color:${r.text}"><span class="rag-dot" style="background:${r.dot}"></span>${sum[k]}</div>`;
  }).join("");
  document.getElementById("syncStatus").textContent = "Synced ✓";
}

// ── Actions (exposed to window for inline handlers) ───────────────────────────
window.setField      = (pid,f,v) => updateProject(pid,p=>p[f]=v);
window.cycleRag      = pid => { const o=["green","yellow","red"]; updateProject(pid,p=>p.rag=o[(o.indexOf(p.rag)+1)%3]); };
window.addProject    = () => { projects.push(emptyProject()); saveToFirebase(); renderAll(); };
window.removeProject = pid => { projects=projects.filter(p=>p.id!==pid); saveToFirebase(); renderAll(); };
window.addDel        = pid => updateProject(pid,p=>p.deliverables.push(emptyDel()));
window.removeDel     = (pid,did) => updateProject(pid,p=>p.deliverables=p.deliverables.filter(d=>d.id!==did));
window.toggleDone    = (pid,did,val) => updateProject(pid,p=>{ const d=p.deliverables.find(d=>d.id===did); d.done=val; if(val) d._open=true; });
window.toggleBilling = (pid,did) => { const p=getProject(pid); const d=p.deliverables.find(d=>d.id===did); if(!d.done) return; d._open=!d._open; saveToFirebase(); renderAll(); };
window.setBilling    = (pid,did,f,v) => updateProject(pid,p=>{ p.deliverables.find(d=>d.id===did).billing[f]=v; });
window.setDelAmount = (pid,did,v) => updateProject(pid,p=>{ p.deliverables.find(d=>d.id===did).amount=v; });
window.setDelName   = (pid,did,v) => updateProject(pid,p=>{ p.deliverables.find(d=>d.id===did).name=v; });

// ── Upload ────────────────────────────────────────────────────────────────────
window.handleUpload = async (pid, input) => {
  const file = input.files[0]; if(!file) return;
  const errEl = document.getElementById("uerr_"+pid);
  const key = document.getElementById("apiKey").value.trim() || localStorage.getItem("green_api_key") || "";
  if(!key){ errEl.textContent="No API key entered above."; return; }
  localStorage.setItem("green_api_key", key);
  errEl.textContent="Parsing…";
  try {
    let messages;
    if(file.name.endsWith(".pdf")){
      const buf=await file.arrayBuffer(); let s="";
      new Uint8Array(buf).forEach(b=>s+=String.fromCharCode(b));
      messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:btoa(s)}},{type:"text",text:'List all deliverables. Return ONLY a JSON array of strings.'}]}];
    } else {
      const text=await file.text();
      messages=[{role:"user",content:`List all deliverables. Return ONLY a JSON array of strings.\n\n${text.slice(0,4000)}`}];
    }
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages})
    });
    const data=await res.json();
    if(data.error){ errEl.textContent="API error: "+data.error.message; return; }
    const raw=data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(raw);
    updateProject(pid,p=>parsed.forEach(name=>p.deliverables.push(emptyDel(name))));
    errEl.textContent="";
  } catch(e){ errEl.textContent="Error: "+e.message; }
  input.value="";
};

// ── Export PDF ────────────────────────────────────────────────────────────────
window.exportPDF = pid => {
  const p=getProject(pid);
  const {cv,paid,ar,remaining,paidPct,arPctC,arPctR}=calcFin(p);
  const r=RAG[p.rag];
  const rows=p.deliverables.map(d=>{
    const b=d.billing;
    const bStatus=b.paid?"Paid":b.invoiceSent?`Sent${b.sentDate?" ("+daysSince(b.sentDate)+"d)":""}`:b.invoiceReady?"Invoice ready":d.done?"No invoice":"—";
    const bColor=b.paid?"#3a6b3a":b.invoiceSent?"#7a6020":"#7a8c7a";
    return `<tr style="border-bottom:0.5px solid #d8e8d8">
      <td style="padding:6px 8px;font-size:12px;color:${d.done?"#7a8c7a":"#2c3c2c"};text-decoration:${d.done?"line-through":"none"}">${d.name||"—"}</td>
      <td style="padding:6px 8px;font-size:12px;text-align:center;color:${d.done?"#3a6b3a":"#b0c0b0"}">${d.done?"✓":"○"}</td>
      <td style="padding:6px 8px;font-size:12px;color:#7a8c7a">${d.amount?p.currency+" "+fmt(d.amount):"—"}</td>
      <td style="padding:6px 8px;font-size:12px;color:${bColor}">${bStatus}</td>
    </tr>`;
  }).join("");
  const finBlock=cv?`<div style="margin-bottom:20px;padding:12px;background:#eef5ee;border-radius:8px;border:1px solid #d8e8d8">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:10px;color:#7a8c7a;text-transform:uppercase;font-weight:600">Contract finances</span>
      <span style="font-size:12px;font-weight:600">${p.currency} ${fmt(cv)}</span>
    </div>
    <div style="height:10px;background:#dceadc;border-radius:6px;overflow:hidden;display:flex;margin-bottom:8px">
      <div style="width:${paidPct}%;background:#3a6b3a"></div><div style="width:${arPctC}%;background:#c8a030"></div>
    </div>
    <div style="font-size:11px;color:#2c3c2c;display:flex;flex-direction:column;gap:3px">
      <span><b>${paidPct}% paid</b> — ${p.currency} ${fmt(paid)}</span>
      ${ar>0?`<span>AR: <b>${p.currency} ${fmt(ar)}</b> — ${arPctC}% of contract · ${arPctR}% of outstanding</span>`:""}
      <span>Outstanding: ${p.currency} ${fmt(remaining)}</span>
    </div>
  </div>`:"";
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${p.name}</title>
  <style>body{font-family:sans-serif;margin:0;padding:32px;color:#2c3c2c}@media print{body{padding:20px}}</style></head><body>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #d8e8d8">
    <div><div style="font-size:20px;font-weight:600">${p.name||"Project"}</div>
    <div style="font-size:13px;color:#7a8c7a;margin-top:4px">${p.client||""}</div></div>
    <div style="background:${r.bg};color:${r.text};font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px">${r.label}</div>
  </div>${finBlock}
  <div style="font-size:10px;color:#7a8c7a;text-transform:uppercase;font-weight:600;margin-bottom:8px">Deliverables</div>
  <table style="width:100%;border-collapse:collapse;border:0.5px solid #d8e8d8">
    <thead><tr style="background:#eef5ee">
      <th style="padding:6px 8px;font-size:11px;color:#7a8c7a;text-align:left">Deliverable</th>
      <th style="padding:6px 8px;font-size:11px;color:#7a8c7a;text-align:center">Done</th>
      <th style="padding:6px 8px;font-size:11px;color:#7a8c7a;text-align:left">Amount</th>
      <th style="padding:6px 8px;font-size:11px;color:#7a8c7a;text-align:left">Billing</th>
    </tr></thead>
    <tbody>${rows||'<tr><td colspan="4" style="padding:12px;font-size:12px;color:#b0c0b0;font-style:italic">No deliverables</td></tr>'}</tbody>
  </table>
  <div style="margin-top:20px;font-size:10px;color:#b0c0b0;text-align:right">GREEN Engineering KZ · ${new Date().toLocaleDateString("en-GB")}</div>
  </body></html>`;
  const w=window.open("","_blank"); w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
};

// ── Export PPTX ───────────────────────────────────────────────────────────────
window.exportPPTX = pid => {
  const p=getProject(pid);
  const {cv,paid,ar,remaining,paidPct,arPctC,arPctR}=calcFin(p);
  const r=RAG[p.rag];
  const ragHex=r.text.replace("#",""); const ragBgHex=r.bg.replace("#","");
  const prs=new PptxGenJS(); prs.layout="LAYOUT_WIDE";
  const slide=prs.addSlide(); slide.background={color:"f7f9f7"};
  slide.addShape(prs.ShapeType.rect,{x:0,y:0,w:"100%",h:1.1,fill:{color:"eef5ee"}});
  slide.addText(p.name||"Project",{x:0.4,y:0.15,w:7,h:0.5,fontSize:22,bold:true,color:"2c3c2c"});
  slide.addText(p.client||"",{x:0.4,y:0.65,w:7,h:0.3,fontSize:12,color:"7a8c7a"});
  slide.addShape(prs.ShapeType.roundRect,{x:8.4,y:0.25,w:1.4,h:0.4,rectRadius:0.2,fill:{color:ragBgHex}});
  slide.addText(r.label,{x:8.4,y:0.25,w:1.4,h:0.4,fontSize:11,bold:true,color:ragHex,align:"center",valign:"middle"});
  let yOff=1.3;
  if(cv){
    slide.addShape(prs.ShapeType.rect,{x:0.4,y:yOff,w:9.4,h:1.5,fill:{color:"eef5ee"},line:{color:"d8e8d8",pt:0.5}});
    slide.addText("CONTRACT FINANCES",{x:0.6,y:yOff+0.1,w:5,h:0.25,fontSize:8,bold:true,color:"7a8c7a",charSpacing:1});
    slide.addText(`${p.currency} ${fmt(cv)}`,{x:6.5,y:yOff+0.1,w:3,h:0.25,fontSize:11,bold:true,color:"2c3c2c",align:"right"});
    slide.addShape(prs.ShapeType.rect,{x:0.6,y:yOff+0.45,w:9.0,h:0.18,fill:{color:"dceadc"}});
    if(paidPct>0) slide.addShape(prs.ShapeType.rect,{x:0.6,y:yOff+0.45,w:9.0*paidPct/100,h:0.18,fill:{color:"3a6b3a"}});
    if(arPctC>0)  slide.addShape(prs.ShapeType.rect,{x:0.6+9.0*paidPct/100,y:yOff+0.45,w:9.0*arPctC/100,h:0.18,fill:{color:"c8a030"}});
    const fl=[`${paidPct}% paid — ${p.currency} ${fmt(paid)}`,ar>0?`AR: ${p.currency} ${fmt(ar)} — ${arPctC}% of contract · ${arPctR}% of outstanding`:null,`Outstanding: ${p.currency} ${fmt(remaining)}`].filter(Boolean).join("     ");
    slide.addText(fl,{x:0.6,y:yOff+0.72,w:9.0,h:0.5,fontSize:9,color:"2c3c2c",wrap:true});
    yOff+=1.7;
  }
  slide.addText("DELIVERABLES",{x:0.4,y:yOff,w:9.4,h:0.25,fontSize:8,bold:true,color:"7a8c7a",charSpacing:1}); yOff+=0.3;
  const tRows=[
    [{text:"Deliverable",options:{bold:true,color:"7a8c7a"}},{text:"Done",options:{bold:true,color:"7a8c7a",align:"center"}},{text:"Amount",options:{bold:true,color:"7a8c7a"}},{text:"Billing",options:{bold:true,color:"7a8c7a"}}],
    ...p.deliverables.map(d=>{
      const b=d.billing;
      const bStatus=b.paid?"Paid":b.invoiceSent?`Sent (${daysSince(b.sentDate)??"?"}d)`:b.invoiceReady?"Invoice ready":d.done?"No invoice":"—";
      const bColor=b.paid?"3a6b3a":b.invoiceSent?"7a6020":"7a8c7a";
      return [{text:d.name,options:{color:d.done?"7a8c7a":"2c3c2c",strike:d.done}},{text:d.done?"✓":"○",options:{align:"center",color:d.done?"3a6b3a":"b0c0b0"}},{text:d.amount?`${p.currency} ${fmt(d.amount)}`:"—",options:{color:"7a8c7a"}},{text:bStatus,options:{color:bColor}}];
    })
  ];
  if(tRows.length>1) slide.addTable(tRows,{x:0.4,y:yOff,w:9.4,colW:[4.5,0.8,1.8,2.3],fill:{color:"f7f9f7"},border:{color:"d8e8d8",pt:0.5},fontSize:10,color:"2c3c2c"});
  slide.addText(`GREEN Engineering KZ · ${new Date().toLocaleDateString("en-GB")}`,{x:0.4,y:6.8,w:9.4,h:0.25,fontSize:8,color:"b0c0b0",align:"right"});
  prs.writeFile({fileName:`${p.name||"project"}_status.pptx`});
};

// ── Firebase listener (real-time sync) ────────────────────────────────────────
onValue(dbRef, snapshot => {
  const data = snapshot.val();
  let loaded = [];
  if (Array.isArray(data)) {
    loaded = data;
  } else if (data && typeof data === "object") {
    loaded = Object.values(data);
  }
  // Sanitize: ensure every project has a deliverables array
  projects = loaded.map(p => ({
    ...p,
    deliverables: Array.isArray(p.deliverables) ? p.deliverables.map(d => ({
      ...d,
      billing: d.billing || emptyBilling()
    })) : []
  }));
  if (projects.length === 0) projects = [emptyProject()];
  renderAll();
});
</script>
